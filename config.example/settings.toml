[general]
app_name = "Money Tracker"
# base_currency is stamped on every new (and migrated) transaction and used
# as the display currency across all figures.
base_currency = "USD"
data_dir = "data"

[emergency_fund]
# Your emergency-fund target is modelled as
#   target_months x monthly_required_expenses.
# Replace these with your own figures.
monthly_required_expenses = 1000.0
target_months = 3
savings_account = "Savings"

[privacy]
# When enabled, the Home page automatically hides all amounts after it has been
# left idle for `idle_seconds`. Click the eye toggle to reveal them again.
auto_enabled = true
idle_seconds = 10

[tax]
# The Income Tax page sums this expense subcategory over the year as the tax you
# have already paid (withholding / prepayments). Choose it on the Settings page.
paid_subcategory = "Tax"

[date_format]
input = "%Y-%m-%d %H:%M:%S"
display = "%b %Y"
