name: Build desktop apps

# Frozen, no-Python-needed downloads for each OS. Runs on demand and on version
# tags; a tag build additionally attaches the artifacts to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write  # needed to create/attach Releases on tag builds

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
          - os: ubuntu-latest
            name: Linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build with PyInstaller
        run: pyinstaller packaging/moneytracker.spec

      # ---- Package per OS into a single downloadable ----
      - name: Package (macOS DMG)
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Money Tracker" \
            --app-drop-link 450 160 \
            --icon "Money Tracker.app" 150 160 \
            "dist/MoneyTracker-macOS.dmg" \
            "dist/Money Tracker.app" \
          || hdiutil create -volname "Money Tracker" -srcfolder "dist/Money Tracker.app" -ov -format UDZO "dist/MoneyTracker-macOS.dmg"

      - name: Package (Linux AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -e
          APPDIR=dist/MoneyTracker.AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp dist/MoneyTracker "$APPDIR/usr/bin/MoneyTracker"
          cp packaging/icon.png "$APPDIR/money-tracker.png"
          cat > "$APPDIR/money-tracker.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Money Tracker
          Exec=MoneyTracker
          Icon=money-tracker
          Categories=Office;Finance;
          Terminal=false
          EOF
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/MoneyTracker" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract-and-run "$APPDIR" dist/MoneyTracker-Linux.AppImage \
          || tar -C dist -czf dist/MoneyTracker-Linux.tar.gz MoneyTracker

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item dist/MoneyTracker.exe dist/MoneyTracker-Windows.exe
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MoneyTracker-${{ matrix.name }}
          path: |
            dist/MoneyTracker-macOS.dmg
            dist/MoneyTracker-Windows.exe
            dist/MoneyTracker-Linux.AppImage
            dist/MoneyTracker-Linux.tar.gz
          if-no-files-found: ignore

      - name: Attach to Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MoneyTracker-macOS.dmg
            dist/MoneyTracker-Windows.exe
            dist/MoneyTracker-Linux.AppImage
            dist/MoneyTracker-Linux.tar.gz
          fail_on_unmatched_files: false
