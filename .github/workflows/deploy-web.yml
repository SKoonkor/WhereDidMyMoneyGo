# Build the static web app (web/) and deploy it to GitHub Pages.
#
# One-time setup in the repo: Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". Then the app is served at
# https://<user>.github.io/WhereDidMyMoneyGo/ .
name: Deploy web app

on:
  push:
    branches: [main]
    paths: ['web/**', '.github/workflows/deploy-web.yml']
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - name: Build
        # Sub-path base so asset/manifest URLs resolve under /WhereDidMyMoneyGo/.
        env:
          BASE_PATH: /WhereDidMyMoneyGo/
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
